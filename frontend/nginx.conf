server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: proxy /api requests to backend if we want to avoid CORS issues completely,
    # but currently we expect frontend to call backend directly if CORS is enabled.
}
